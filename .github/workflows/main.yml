name: Backend CI/CD

on:
push:
branches: [main]

jobs:
build:
runs-on: ubuntu-latest

```
steps:
  # 1. Checkout code
  - name: Checkout Code
    uses: actions/checkout@v3

  # 2. Setup Node.js
  - name: Setup Node
    uses: actions/setup-node@v3
    with:
      node-version: 18

  # 3. Install dependencies
  - name: Install Dependencies
    run: npm install

  # 4. Run tests (optional)
  - name: Run Tests
    run: npm test || echo "No tests"
```

deploy:
needs: build
runs-on: ubuntu-latest

```
steps:
  - name: Deploy to VPS
    uses: appleboy/ssh-action@v0.1.10
    with:
      host: ${{ secrets.SERVER_HOST }}
      username: root
      key: ${{ secrets.SSH_PRIVATE_KEY }}
      script: |
        cd ~/mbusiness/M-Business/Backend
        git pull origin main
        npm install
        pm2 restart mbusiness
```
