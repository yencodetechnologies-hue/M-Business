<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 120" width="420" height="120">
  <defs>
    <!-- Main purple gradient -->
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#9333ea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c084fc;stop-opacity:1" />
    </linearGradient>
    <!-- Soft glow gradient for icon bg -->
    <radialGradient id="glowBg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:0.25" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0.05" />
    </radialGradient>
    <!-- Text gradient -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b0764;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6d28d9;stop-opacity:1" />
    </linearGradient>
    <!-- Shimmer on M -->
    <linearGradient id="mShimmer" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.9" />
      <stop offset="60%" style="stop-color:#e9d5ff;stop-opacity:0.95" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:1" />
    </linearGradient>
    <!-- Drop shadow filter -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#9333ea" flood-opacity="0.35"/>
    </filter>
    <filter id="textShadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#7c3aed" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Icon background: rounded square with glow -->
  <rect x="8" y="8" width="104" height="104" rx="24" ry="24" fill="url(#purpleGrad)" filter="url(#shadow)"/>
  <!-- Inner glow circle -->
  <ellipse cx="60" cy="60" rx="44" ry="44" fill="url(#glowBg)"/>
  <!-- Subtle inner border -->
  <rect x="8" y="8" width="104" height="104" rx="24" ry="24" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1.5"/>

  <!-- M letter — bold geometric, white -->
  <text
    x="60" y="78"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="72"
    font-weight="900"
    fill="url(#mShimmer)"
    letter-spacing="-2"
  >M</text>

  <!-- Decorative underline accent below M -->
  <rect x="28" y="88" width="64" height="4" rx="2" fill="rgba(255,255,255,0.35)"/>

  <!-- Company name: M Business -->
  <text
    x="132" y="52"
    font-family="Georgia, 'Palatino Linotype', serif"
    font-size="36"
    font-weight="700"
    fill="url(#textGrad)"
    filter="url(#textShadow)"
    letter-spacing="0.5"
  >M Business</text>

  <!-- Tagline -->
  <text
    x="134" y="74"
    font-family="'Trebuchet MS', Arial, sans-serif"
    font-size="13"
    font-weight="500"
    fill="#9333ea"
    letter-spacing="3.5"
  >MANAGEMENT SUITE</text>

  <!-- Purple accent line under tagline -->
  <rect x="134" y="82" width="210" height="2.5" rx="1.5">
    <animate attributeName="width" from="0" to="210" dur="1s" fill="freeze"/>
  </rect>
  <rect x="134" y="82" width="210" height="2.5" rx="1.5" fill="url(#purpleGrad)" opacity="0.8"/>

  <!-- Small decorative dot accent -->
  <circle cx="352" cy="83" r="4" fill="#c084fc"/>
  <circle cx="364" cy="83" r="2.5" fill="#a855f7" opacity="0.5"/>
</svg>
